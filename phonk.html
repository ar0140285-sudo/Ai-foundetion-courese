<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Phonk Lounge</title>
    <style>
        /* 🩸 WHITE GLASS + RED GLOW THEME */
        body { margin: 0; padding: 0; background-color: #050505; font-family: sans-serif; color: #fff; }
        
        .phonk-container { max-width: 1000px; margin: 40px auto; padding: 20px; }

        .search-box {
            width: 100%; padding: 15px 25px;
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 0, 0.4); 
            border-radius: 15px; color: #fff; font-size: 18px; outline: none; margin-bottom: 30px;
        }

        .dashboard { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }

        .player-glass, .playlist-glass {
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 0, 0.5); 
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); 
            border-radius: 25px; padding: 40px 20px; text-align: center;
        }

        .disc {
            width: 160px; height: 160px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.1), rgba(0,0,0,0.8));
            border: 2px solid rgba(255, 0, 0, 0.5);
            margin: 0 auto 25px auto; display: flex; justify-content: center; align-items: center;
            animation: spinDisc 3s linear infinite paused;
        }
        .disc.playing { animation-play-state: running; }
        @keyframes spinDisc { 100% { transform: rotate(360deg); } }

        .ctrl-btn { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 0, 0, 0.4); 
            color: #fff; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center;
        }
        .play-pause { width: 60px; height: 60px; border-color: rgba(255, 0, 0, 0.8); }

        .playlist-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; margin-bottom: 10px; background: rgba(255,255,255,0.02);
            border-radius: 15px; border: 1px solid transparent; cursor: pointer;
        }
        .playlist-item.active { background: rgba(255, 0, 0, 0.1); border-left: 5px solid #ff0000; }
        
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <a href="private.html" style="position: absolute; top: 15px; left: 15px; color: #fff; text-decoration: none; border: 1px solid #fff; padding: 5px 10px;">🔙 Back</a>

    <div class="phonk-container">
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search Phonk Track..." oninput="filterSongs()">

        <div class="dashboard">
            <div class="player-glass">
                <div class="disc" id="disc"><div style="width:40px;height:40px;border-radius:50%;border:2px solid red;"></div></div>
                <h2 id="player-title">Select a Song</h2>
                <div style="display:flex; justify-content:center; gap:20px; margin-top:20px;">
                    <div class="ctrl-btn" onclick="prevSong()">⏮</div>
                    <div class="ctrl-btn play-pause" id="play-btn" onclick="togglePlay()">▶</div>
                    <div class="ctrl-btn" onclick="nextSong()">⏭</div>
                </div>
            </div>

            <div class="playlist-glass" id="playlist"></div>
        </div>
    </div>

    <audio id="audio"></audio>

    
<script>
        const allSongs = [
            { id: 0, title: "Pehla Phonk", artist: "Akash Edits", src: "assets/songs/song1.m4a" },
            { id: 1, title: "Dusra Phonk", artist: "Akash Edits", src: "assets/songs/song2.mp3" }
        ];

        let currentSongId = allSongs[0].id;
        const audio = document.getElementById("audio");
        const playlistContainer = document.getElementById("playlist");

        function renderPlaylist(filterText) {
            if (!filterText) filterText = "";
            playlistContainer.innerHTML = "";
            
            const filtered = allSongs.filter(function(s) {
                return s.title.toLowerCase().includes(filterText.toLowerCase());
            });
            
            filtered.forEach(function(song) {
                const item = document.createElement("div");
                
                // Bina backtick ka safe tarika
                let activeClass = "";
                if (song.id === currentSongId) {
                    activeClass = "active";
                }
                item.className = "playlist-item " + activeClass;
                
                item.onclick = function() { playSpecificSong(song.id); };
                
                // Yahan backtick ki jagah normal quotes aur + use kiya hai (Ye kabhi fail nahi hoga)
                item.innerHTML = '<div class="song-details">' + 
                                 '<h4>' + song.title + '</h4>' + 
                                 '<p>' + song.artist + '</p>' + 
                                 '</div>' + 
                                 '<div class="play-icon">🎵</div>';
                
                playlistContainer.appendChild(item);
            });
        }

        function playSpecificSong(songId) {
            currentSongId = songId;
            const song = allSongs.find(function(s) { return s.id === songId; });
            document.getElementById("player-title").innerText = song.title;
            audio.src = song.src;
            audio.play();
            document.getElementById("play-btn").innerText = "⏸";
            document.getElementById("disc").classList.add("playing");
            renderPlaylist();
        }

        function togglePlay() {
            if (audio.paused) { 
                audio.play(); 
                document.getElementById("play-btn").innerText = "⏸"; 
                document.getElementById("disc").classList.add("playing"); 
            } else { 
                audio.pause(); 
                document.getElementById("play-btn").innerText = "▶"; 
                document.getElementById("disc").classList.remove("playing"); 
            }
        }

        function nextSong() {
            let idx = allSongs.findIndex(function(s) { return s.id === currentSongId; });
            playSpecificSong(allSongs[(idx + 1) % allSongs.length].id);
        }

        function prevSong() {
            let idx = allSongs.findIndex(function(s) { return s.id === currentSongId; });
            playSpecificSong(allSongs[(idx - 1 + allSongs.length) % allSongs.length].id);
        }

        function filterSongs() { 
            renderPlaylist(document.getElementById("searchInput").value); 
        }

        // Player start hone par list dikhana
        renderPlaylist();
    </script>


</body>
</html>
