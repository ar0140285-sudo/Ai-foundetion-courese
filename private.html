<script>
        // Password ko encrypt (hash) karne wala function
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        async function unlock() {
            let pass = document.getElementById("pass-input").value;
            
            // Ye tumhare "akashjirathod" ka encrypted hash code hai. 
            // Isko Inspect me dekh kar bhi koi password nahi jaan payega!
            const correctHash = "fdadf2434d34121b622fd3766187a82d54caf70d052f5229404e2d5c1ee4f53d";

            // User ne jo text daala, uska hash banayenge
            let enteredHash = await hashPassword(pass);

            // Ab do hashes ko match kar rahe hain, asli password ko nahi
            if (enteredHash === correctHash) {
                document.getElementById("password-area").style.display = "none";
                let secretObj = document.getElementById("secret-content");
                secretObj.style.display = "flex";
                secretObj.classList.add("animate-fade-in");
            } else {
                document.getElementById("error-msg").style.display = "block";
            }
        }
    </script>
